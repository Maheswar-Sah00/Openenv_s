# OpenEnv manifest (openenv validate / HF Space)
spec_version: 1
name: scam-detection-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: AI environment for scam detection and mitigation (fraud analyst simulation)
version: "1.0.0"
observation_schema_version: "1.1"

actions:
  - ignore
  - verify_sender
  - warn_user
  - flag_scam
  - block_sender
  - escalate_to_bank

observation_keys:
  - observation_schema_version
  - case_id
  - message_text
  - sender_type
  - channel
  - link_present
  - urgency_score
  - conversation_history
  - sender_verified
  - risk_score
  - risk_factors
  - steps_taken
  - max_episode_steps
  - terminal_actions

reward_notes:
  step_reward: Shaped feedback for RL-style training (dense signals).
  grader_score: Deterministic per task; emitted strictly in (0,1) via tasks/graders.py → graders/scam_grader.py (0.01–0.99).

# tasks/graders.py is the canonical grader module (community layout); all three tasks delegate there.
tasks:
  - id: easy
    description: Single-turn scam vs legitimate triage; escalate or avoid false positives.
    steps: 8
    ideal_action: verify_sender then warn_user then flag_scam on scams; ignore on clear legitimate.
    grader: tasks/graders.py
  - id: medium
    description: Multi-line scams; verification gates further thread content before full credit.
    steps: 12
    ideal_action: verify_sender and warn_user before flag_scam or escalate_to_bank on scams.
    grader: tasks/graders.py
  - id: hard
    description: Thread unfolds over steps; early verify and warn before terminal escalation.
    steps: 20
    ideal_action: verify_sender early, warn_user, then flag_scam or escalate_to_bank.
    grader: tasks/graders.py

tasks_with_graders:
  - task_id: easy
    grader: tasks/graders.py
  - task_id: medium
    grader: tasks/graders.py
  - task_id: hard
    grader: tasks/graders.py
