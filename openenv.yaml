# OpenEnv manifest (openenv validate / HF Space)
spec_version: 1
name: scam-detection-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: AI environment for scam detection and mitigation (fraud analyst simulation)
version: "1.0.0"
observation_schema_version: "1.1"

actions:
  - ignore
  - verify_sender
  - warn_user
  - flag_scam
  - block_sender
  - escalate_to_bank

observation_keys:
  - observation_schema_version
  - case_id
  - message_text
  - sender_type
  - channel
  - link_present
  - urgency_score
  - conversation_history
  - sender_verified
  - risk_score
  - risk_factors
  - steps_taken
  - max_episode_steps
  - terminal_actions

reward_notes:
  step_reward: Shaped feedback for RL-style training (dense signals).
  grader_score: Deterministic per task; emitted strictly in (0,1) via tasks/graders.py; scenarios from tasks/database.py (0.01–0.99).

# Scoring logic in tasks/graders.py; per-task grader_*.py entry files for static validators.
tasks:
  - id: single_turn_triage
    description: Single-turn scam vs legitimate triage; avoid false positives on clear legitimate traffic.
    steps: 8
    ideal_action: verify_sender then warn_user then flag_scam on scams; ignore on clear legitimate.
    grader: tasks/grader_single_turn_triage.py
  - id: verify_warn_chain
    description: Multi-line scams; verify sender and warn user before escalating.
    steps: 12
    ideal_action: verify_sender and warn_user before flag_scam or escalate_to_bank on scams.
    grader: tasks/grader_verify_warn_chain.py
  - id: progressive_thread
    description: Thread unfolds over steps; early verify and warn before terminal escalation.
    steps: 20
    ideal_action: verify_sender early, warn_user, then flag_scam or escalate_to_bank.
    grader: tasks/grader_progressive_thread.py
  - id: gray_boundary
    description: Ambiguous gray-area cases; partial credit and careful verification.
    steps: 10
    ideal_action: verify_sender before terminal actions; calibrate flag vs ignore.
    grader: tasks/grader_gray_boundary.py
  - id: otp_kyc_pressure
    description: OTP and KYC pressure patterns; verify before trusting urgency.
    steps: 12
    ideal_action: verify_sender early, warn_user on scams; avoid sharing OTP or credentials.
    grader: tasks/grader_otp_kyc_pressure.py
  - id: link_phishing_surface
    description: Link-bearing phishing; treat links and sender verification as high-risk signals.
    steps: 10
    ideal_action: verify_sender before acting; flag or escalate when scam indicators align.
    grader: tasks/grader_link_phishing_surface.py

tasks_with_graders:
  - task_id: single_turn_triage
    grader: tasks/grader_single_turn_triage.py
  - task_id: verify_warn_chain
    grader: tasks/grader_verify_warn_chain.py
  - task_id: progressive_thread
    grader: tasks/grader_progressive_thread.py
  - task_id: gray_boundary
    grader: tasks/grader_gray_boundary.py
  - task_id: otp_kyc_pressure
    grader: tasks/grader_otp_kyc_pressure.py
  - task_id: link_phishing_surface
    grader: tasks/grader_link_phishing_surface.py
