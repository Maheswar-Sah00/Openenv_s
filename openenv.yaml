# OpenEnv manifest (openenv validate / HF Space)
spec_version: 1
name: scam-detection-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: AI environment for scam detection and mitigation (fraud analyst simulation)
version: "1.0.0"
observation_schema_version: "1.1"

actions:
  - ignore
  - verify_sender
  - warn_user
  - flag_scam
  - block_sender
  - escalate_to_bank

observation_keys:
  - observation_schema_version
  - case_id
  - message_text
  - sender_type
  - channel
  - link_present
  - urgency_score
  - conversation_history
  - sender_verified
  - risk_score
  - risk_factors
  - steps_taken
  - max_episode_steps
  - terminal_actions

reward_notes:
  step_reward: Shaped feedback for RL-style training (dense signals).
  grader_score: Deterministic per task; emitted strictly in (0,1) via graders/scam_grader.py (0.01–0.99).

# Three tasks with **distinct grader files** (Phase 2 validators often count modules, not one shared file).
# Shared logic lives in graders/scam_grader.py; easy/medium/hard modules wrap grade_episode(task_id, ...).
tasks:
  - id: easy
    grader: graders/easy_grader.py
  - id: medium
    grader: graders/medium_grader.py
  - id: hard
    grader: graders/hard_grader.py

# Legacy alias for scanners that look for this exact key:
tasks_with_graders:
  - task_id: easy
    grader: graders/easy_grader.py
  - task_id: medium
    grader: graders/medium_grader.py
  - task_id: hard
    grader: graders/hard_grader.py
